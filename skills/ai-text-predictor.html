<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Text Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0f2027;
      font-family: 'Roboto', sans-serif;
      color: #00eaff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 100px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #00bcd4;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      z-index: 10;
      transition: background 0.3s;
    }

    #back:hover {
      background: #008c9e;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
    }

    #inputArea {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 500px;
    }

    input {
      padding: 12px 15px;
      width: 100%;
      font-size: 1.2rem;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-bottom: 20px;
    }

    .suggestions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .suggestion {
      background: rgba(0, 188, 212, 0.2);
      backdrop-filter: blur(8px);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      font-weight: 500;
    }

    .suggestion:hover {
      background: #00eaff;
      color: #111;
    }
  </style>
</head>
<body>
  <a id="back" href="../index.html#AI">← Back to Skills</a>

  <h1>AI Text Predictor</h1>

  <div id="inputArea">
    <input type="text" id="textInput" placeholder="Start typing..." autocomplete="off">
    <div id="suggestions" class="suggestions"></div>
  </div>

    "C": ["Cat", "Chair", "Chart", "Clock", "Cloud", "Cream", "Candle", "Card", "Cycle", "Candy", "Crane", "Course", "Comic", "Cabin", "Climb", "Claim", "Crack", "Coast", "Calm", "Craft"],
    "D": ["Dog", "Desk", "Drill", "Dance", "Drive", "Drop", "Drift", "Dream", "Drum", "Doubt", "Diner", "Draft", "Delay", "Daisy", "Ditch", "Daily", "Drama", "Drape", "Dose", "Dwell"],

    "Y": ["Yarn", "Yawn", "Yard", "Yolk", "Yeti", "Youth", "Yield", "Yacht", "Yodel", "Yummy", "Yearn", "Yapper", "Yonder", "Yellow", "Yabber", "Yeoman", "Yanked", "Yuppie", "Yammer", "Yaffle"],
    "Z": ["Zoo", "Zone", "Zinc", "Zest", "Zero", "Zoom", "Zebra", "Zippy", "Zodiac", "Zinger", "Zappy", "Zephyr", "Zipper", "Zodiacal", "Zygote", "Zymurgy", "Zillion", "Zircon", "Zealot", "Zookeeper"]
  };
  </script>

  <script>
    const textInput = document.getElementById("textInput");
    const suggestionsBox = document.getElementById("suggestions");
    let allWords = [];

    Object.values(wordsJSON).forEach(arr =>
      allWords.push(...arr.map(w => w.toLowerCase()))
    );

    textInput.addEventListener("input", () => {
      const value = textInput.value.toLowerCase();
      suggestionsBox.innerHTML = "";
      if (!value) return;

      const matches = allWords.filter(word => word.startsWith(value)).slice(0, 5);
      matches.forEach(match => {
        const div = document.createElement("div");
        div.classList.add("suggestion");
        div.textContent = match;
        div.onclick = () => {
          textInput.value = match;
          suggestionsBox.innerHTML = "";
        };
        suggestionsBox.appendChild(div);
      });
    });
  </script>
</body>
</html>
